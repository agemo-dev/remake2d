name: REMAKE2D — CI Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: REMAKE2D-${{ matrix.os }}-${{ matrix.mode }}-${{ matrix.type }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        mode: [Release, Debug]
        type: [static, shared]

    steps:
      - uses: actions/checkout@v4

      - uses: lukka/get-cmake@latest
      - uses: seanmiddleditch/gha-setup-ninja@master

      - uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/build/_deps
          key: REMAKE2D-${{ matrix.os }}-${{ matrix.mode }}-deps-cache

      - name: Configure CMake Shared
        if: matrix.type == 'shared'
        run: >
          cmake -B "${{ github.workspace }}/build"
          -DCMAKE_BUILD_TYPE=${{ matrix.mode }}
          -DBUILD_SHARED_LIBS=ON
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"
          -G Ninja

      - name: Configure CMake Static
        if: matrix.type == 'static'
        run: >
          cmake -B "${{ github.workspace }}/build"
          -DCMAKE_BUILD_TYPE=${{ matrix.mode }}
          -DBUILD_SHARED_LIBS=OFF
          -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/install"
          -G Ninja

      - name: Build Library
        run: cmake --build "${{ github.workspace }}/build" --config ${{ matrix.mode }}

      - name: Install Library
        run: cmake --install "${{ github.workspace }}/build" --config ${{ matrix.mode }}

      - name: Generate compile test (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p "${{ github.workspace }}/smoke"
          cat > "${{ github.workspace }}/smoke/compile.cpp" << 'EOF'
          #include <remake2d/system.hpp>
          #include <remake2d/loop.hpp>
          #include <iostream>

          int main(void) {
              rmk::system.init();
              std::cout << "built success — plateform name : " << rmk::system.info.platform() << std::endl;
              rmk::loop.update();
              return 0;
          }
          EOF

      - name: Generate compile test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ github.workspace }}\smoke"
          @'
          #include <remake2d/system.hpp>
          #include <remake2d/loop.hpp>
          #include <iostream>

          int main(void) {
              rmk::system.init();
              std::cout << "built success — plateform name : " << rmk::system.info.platform() << std::endl;
              rmk::loop.update();
              return 0;
          }
          '@ | Set-Content -Path "${{ github.workspace }}\smoke\compile.cpp"

      - name: Write smoke CMakeLists
        shell: bash
        run: |
          cat > "${{ github.workspace }}/smoke/CMakeLists.txt" << 'EOF'
          cmake_minimum_required(VERSION 3.32)
          project(remake2d_smoke LANGUAGES CXX)
          set(CMAKE_CXX_STANDARD 20)
          set(CMAKE_CXX_STANDARD_REQUIRED ON)
          find_package(remake2d REQUIRED)
          add_executable(compile_test compile.cpp)
          target_link_libraries(compile_test PRIVATE remake2d::remake2d)
          EOF

      - name: Configure compile test
        run: >
          cmake -S "${{ github.workspace }}/smoke" -B "${{ github.workspace }}/smoke/build"
          -DCMAKE_BUILD_TYPE=${{ matrix.mode }}
          -DCMAKE_PREFIX_PATH="${{ github.workspace }}/install"
          -G Ninja

      - name: Build compile test
        run: cmake --build "${{ github.workspace }}/smoke/build" --config ${{ matrix.mode }}

      - name: Run compile test (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          export SDL_AUDIODRIVER=dummy
          export SDL_VIDEODRIVER=dummy
          export SDL_RENDER_DRIVER=software
          "${{ github.workspace }}/smoke/build/compile_test"

      - name: Copy runtime DLLs (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "${{ github.workspace }}\install\bin\*.dll" -Destination "${{ github.workspace }}\smoke\build\" -ErrorAction SilentlyContinue

      - name: Run compile test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:SDL_AUDIODRIVER = "dummy"
          $env:SDL_VIDEODRIVER = "dummy"
          $env:SDL_RENDER_DRIVER = "software"

          $exePath = Join-Path "${{ github.workspace }}" "smoke\build\compile_test.exe"
          $p = Start-Process -FilePath $exePath -PassThru -NoNewWindow

          $finished = $p.WaitForExit(15000)

          if (-not $finished) {
              Write-Host "Still running after 15s, dumping thread states"
              $proc = Get-Process -Id $p.Id
              foreach ($t in $proc.Threads) {
                  $tid = $t.Id
                  $state = $t.ThreadState
                  $reason = $t.WaitReason
                  Write-Host "Thread $tid State=$state WaitReason=$reason"
              }
              Write-Host "Killing process"
              Stop-Process -Id $p.Id -Force
              exit 1
          } else {
              $code = $p.ExitCode
              Write-Host "Process exited normally with code $code"
		  }


